<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamburguesas con Causa</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <img src="images/hamburguesa.jpg" class="banner">

    <h1>🍔 Hamburguesas con Causa</h1>

    <h2>
        Selecciona tus productos
    </h2>

    <!-- Combo $100 -->
    <div class="producto">

        <h3>
            🍔🥤 Combo Hamburguesa + Refresco
        </h3>

        <div class="precio">
            $100 MXN
        </div>

        <div class="cantidad">

            <button id="menos100">
                −
            </button>

            <span id="cantidad100">
                0
            </span>

            <button id="mas100">
                +
            </button>

        </div>

    </div>

    <!-- Hamburguesa $85 -->
    <div class="producto">

        <h3>
            🍔 Hamburguesa sin soda
        </h3>

        <div class="precio">
            $85 MXN
        </div>

        <div class="cantidad">

            <button id="menos85">
                −
            </button>

            <span id="cantidad85">
                0
            </span>

            <button id="mas85">
                +
            </button>

        </div>

    </div>

    <div class="form">

        <label>
            Nombre
        </label>

        <input
            type="text"
            id="nombre"
            placeholder="Escribe tu nombre">

        <div class="total">

            Total

            <span id="total">
                $0
            </span>

        </div>

        <!-- NUEVO CAMPO HORARIO -->

        <label>
            Horario para recoger
        </label>

        <select id="horario">

            <option value="">
                Selecciona un horario
            </option>

            <option>12:00 p.m.</option>
            <option>12:30 p.m.</option>
            <option>1:00 p.m.</option>
            <option>1:30 p.m.</option>
            <option>2:00 p.m.</option>
            <option>2:30 p.m.</option>
            <option>3:00 p.m.</option>
            <option>3:30 p.m.</option>
            <option>4:00 p.m.</option>
            <option>4:30 p.m.</option>
            <option>5:00 p.m.</option>
            <option>5:30 p.m.</option>
            <option>6:00 p.m.</option>

        </select>

        <label>
            Comentarios
        </label>

        <textarea
            id="comentarios"
            placeholder="Ej. Sin cebolla..."></textarea>

        <button
            class="whatsapp"
            onclick="enviarWhatsapp()">

            🟢 Pedir por WhatsApp

        </button>

    </div>

    <footer>

        ❤️ Gracias por apoyar ❤️

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
